<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/media/favicon.ico">

    <title>Cardio-P</title>
</head>

<body>
    <div class="container-fluid p-0 m-0 vh-100">
        <div class="row g-0 h-100 flex-nowrap">

            <!-- Desktop Sidebar -->
            <aside class="col-auto d-none d-md-flex flex-column p-0" style="width:260px;background:#880808;">

                <!-- Logo -->
                <div class="d-flex align-items-center px-3 py-2" style="border-bottom:2px solid #fff3;">
                    <img src="assets/media/CardioPLogo.png" class="logo me-2" alt="Cardio-P logo">
                    <span class="fw-bold text-white" id="cardiop">Cardio-P</span>
                </div>

                <!-- Navigation -->
                <nav class="sidebar flex-grow-1 p-3">
                    <ul class="nav flex-column gap-2 NavLinks">

                        <li class="nav-item">
                            <a href="#Home" class="nav-link active fw-bold" data-page="Home">
                                <i class="bi bi-house-door me-2"></i>Home
                            </a>
                        </li>

                        <li class="nav-item">
                            <a href="#Products" class="nav-link fw-bold" data-page="Products">
                                <i class="bi bi-bag me-2"></i>Products
                            </a>
                        </li>

                        <li class="nav-item">
                            <a href="#Contacts" class="nav-link fw-bold" data-page="Contacts">
                                <i class="bi bi-telephone me-2"></i>Contacts
                            </a>
                        </li>

                        <li class="nav-item">
                            <a href="#About" class="nav-link fw-bold" data-page="About">
                                <i class="bi bi-info-circle me-2"></i>About
                            </a>
                        </li>

                        <li class="nav-item">
                            <a href="#More" class="nav-link fw-bold" data-page="More">
                                <i class="bi bi-three-dots me-2"></i>More
                            </a>
                        </li>

                    </ul>
                </nav>
            </aside>

            <!-- Main Content -->
            <div class="col d-flex flex-column p-0 m-0">

                <!-- Mobile Navigation -->
                <div class="d-md-none" id="mobileView">
                    <nav class="navbar p-0 m-0" style="background:#880808;">

                        <div class="d-flex align-items-center w-100 p-2">
                            <img src="assets/media/CardioPLogo.png" class="logo me-2" alt="Cardio-P logo">

                            <span class="fw-bold text-white">Cardio-P</span>

                            <button class="navbar-toggler ms-auto border-0 p-0"
                                    type="button"
                                    data-bs-toggle="collapse"
                                    data-bs-target="#mobileMenu"
                                    aria-label="Toggle navigation"
                                    style="background:transparent;box-shadow:none;">

                                <span class="d-block bg-white mb-1" style="width:28px;height:3px;border-radius:2px;"></span>
                                <span class="d-block bg-white mb-1" style="width:28px;height:3px;border-radius:2px;"></span>
                                <span class="d-block bg-white" style="width:28px;height:3px;border-radius:2px;"></span>

                            </button>
                        </div>

                        <div class="collapse w-100" id="mobileMenu">
                            <ul class="nav flex-column">

                                <li class="nav-item">
                                    <a href="#Home" class="nav-link active fw-bold" data-page="Home">Home</a>
                                </li>

                                <li class="nav-item">
                                    <a href="#Products" class="nav-link fw-bold" data-page="Products">Products</a>
                                </li>

                                <li class="nav-item">
                                    <a href="#Contacts" class="nav-link fw-bold" data-page="Contacts">Contacts</a>
                                </li>

                                <li class="nav-item">
                                    <a href="#About" class="nav-link fw-bold" data-page="About">About</a>
                                </li>

                                <li class="nav-item">
                                    <a href="#More" class="nav-link fw-bold" data-page="More">More</a>
                                </li>

                            </ul>
                        </div>

                    </nav>
                </div>

                <!-- Page Content -->
                <!-- Main Content -->
                <main class="d-flex flex-column flex-grow-1 overflow-hidden">

                    <!-- Fixed Page Header -->
                    <section class="page-header d-flex justify-content-between align-items-center px-2 py-1">
                        <h1 id="pageTitle">Home</h1>

                        <div class="social-links">
                            <a href="#"><i class="bi bi-linkedin"></i></a>
                            <a href="#"><i class="bi bi-whatsapp"></i></a>
                            <a href="#"><i class="bi bi-instagram"></i></a>
                            <a href="#"><i class="bi bi-youtube"></i></a>
                        </div>
                    </section>
                    <hr>

                    <!-- Scrollable Content -->
                    <div class="flex-grow-1 overflow-auto">
                        <div id="content" data-include="Pages/home.html">

                            <div class="d-flex justify-content-center align-items-center py-3">
                                <div class="spinner-border me-2"></div>
                                <strong>Loading</strong>
                            </div>

                        </div>
                    </div>

                </main>

            </div>

        </div>
    </div>

    <script src="assets/js/include.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
